<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>{{TITULO}} - API Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
  h1 { color: #58a6ff; margin-bottom: 20px; font-size: 18px; }

  /* Config bar */
  .config { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 24px; }
  .config label { color: #8b949e; font-size: 12px; display: block; margin-bottom: 4px; }
  .config input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px; border-radius: 4px; font-family: monospace; font-size: 13px; }

  /* Environment selector */
  .env-selector { display: flex; gap: 8px; flex-wrap: wrap; }
  .env-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px; transition: all 0.15s; }
  .env-btn:hover { background: #2d333b; color: #c9d1d9; }
  .env-btn.active.local   { border-color: #8b949e; color: #c9d1d9; background: #21262d; }
  .env-btn.active.qa      { border-color: #f0883e; color: #f0883e; background: #f0883e15; }
  .env-btn.active.staging { border-color: #58a6ff; color: #58a6ff; background: #1f6feb22; }
  .env-btn.active.prod    { border-color: #f85149; color: #f85149; background: #f8514920; }
  .env-info { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
  .env-url { color: #484f58; font-size: 12px; font-family: monospace; }
  .env-project { font-size: 11px; padding: 2px 8px; border-radius: 3px; background: #21262d; border: 1px solid #30363d; color: #8b949e; }

  /* Accordion endpoints */
  .endpoint { background: #161b22; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
  .endpoint-header { padding: 12px 16px; background: #21262d; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .endpoint-header:hover { background: #2d333b; }
  .chevron { color: #8b949e; font-size: 12px; transition: transform 0.2s; margin-left: auto; flex-shrink: 0; }
  .endpoint.open .chevron { transform: rotate(90deg); }
  .endpoint-body { display: none; padding: 16px; border-top: 1px solid #30363d; }
  .endpoint.open .endpoint-body { display: block; }

  /* Method badges */
  .method     { color: white; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; flex-shrink: 0; }
  .method-GET    { background: #238636; }
  .method-POST   { background: #1f6feb; }
  .method-PUT    { background: #9e6a03; }
  .method-DELETE { background: #b91c1c; }
  .method-PATCH  { background: #6e40c9; }

  .path { color: #58a6ff; font-size: 14px; }
  .desc { color: #8b949e; font-size: 12px; }

  /* Fields */
  .field { margin-bottom: 10px; }
  .field label { color: #8b949e; font-size: 11px; display: block; margin-bottom: 3px; }
  .field input, .field textarea, .field select {
    width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    padding: 5px 8px; border-radius: 4px; font-family: monospace; font-size: 13px;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field .hint { color: #484f58; font-size: 10px; margin-top: 2px; }
  .section-title { color: #f0883e; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  hr { border: none; border-top: 1px solid #21262d; margin: 14px 0; }

  /* Buttons */
  .btn       { color: white; border: none; padding: 7px 16px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 13px; margin-right: 8px; }
  .btn-run   { background: #238636; } .btn-run:hover   { background: #2ea043; }
  .btn-dl    { background: #1f6feb; } .btn-dl:hover    { background: #388bfd; }
  .btn-curl  { background: #21262d; border: 1px solid #30363d; color: #8b949e; }
  .btn-curl:hover { background: #2d333b; color: #c9d1d9; }

  /* Response */
  .response-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; margin-top: 14px; }
  .response-meta { font-size: 11px; color: #8b949e; }
  .status-ok  { color: #3fb950; }
  .status-err { color: #f85149; }
  .btn-copy { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 11px; }
  .btn-copy:hover { background: #2d333b; color: #c9d1d9; }
  .btn-copy.copied { color: #3fb950; border-color: #3fb95055; }
  pre { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 12px; overflow-x: auto; font-size: 12px; line-height: 1.5; max-height: 420px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }

  /* JSON colors */
  .j-key   { color: #79c0ff; }
  .j-str   { color: #a5d6a7; }
  .j-num   { color: #f0883e; }
  .j-bool  { color: #ff7b72; }
  .j-null  { color: #8b949e; font-style: italic; }
  .j-brace { color: #c9d1d9; }

  /* curl box */
  .curl-box { display: none; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 10px; margin-top: 10px; font-size: 12px; color: #a5d6ff; word-break: break-all; }

  /* Tags */
  .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; border: 1px solid; }
  .tag-blue  { background: #1f6feb22; color: #58a6ff; border-color: #1f6feb55; }
  .tag-green { background: #3fb95022; color: #3fb950; border-color: #3fb95055; }
  .tag-orange{ background: #f0883e22; color: #f0883e; border-color: #f0883e55; }
</style>
</head>
<body>

<h1>{{TITULO}} <span class="tag tag-blue">{{SUBTAG}}</span></h1>

<!-- CONFIG BAR -->
<div class="config">
  <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;align-items:start;">
    <div>
      <label>Ambiente</label>
      <div class="env-selector">
        <button class="env-btn local"            onclick="setEnv('local')"  >Local</button>
        <button class="env-btn qa"               onclick="setEnv('qa')"     >QA</button>
        <button class="env-btn staging active"   onclick="setEnv('staging')">Staging</button>
        <button class="env-btn prod"             onclick="setEnv('prod')"   >Prod</button>
      </div>
      <div class="env-info">
        <span class="env-project" id="envProject">{{SERVICIO}} — Staging</span>
        <span class="env-url"     id="envUrl">{{BASE_URL_STAGING}}</span>
      </div>
    </div>
    <div>
      <label>Authorization token (Bearer)</label>
      <input id="authToken" placeholder="eyJhbG..." />
    </div>
  </div>
</div>

<!-- ============================================================
     ENDPOINTS — duplicar este bloque por cada endpoint
     ============================================================ -->

<!-- ENDPOINT 1: GET /ejemplo/:id -->
<div class="endpoint open" id="ep1">
  <div class="endpoint-header" onclick="toggle('ep1')">
    <span class="method method-GET">GET</span>
    <span class="path">/ejemplo/<b>:id</b></span>
    <span class="desc">&mdash; Descripcion breve del endpoint</span>
    <span class="tag tag-green" style="margin-left:8px;">FEFO</span>
    <span class="chevron">&#9654;</span>
  </div>
  <div class="endpoint-body">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <div class="section-title">Path params</div>
        <div class="field">
          <label>id <span style="color:#f85149">*</span></label>
          <input id="e1_id" value="" placeholder="ej: 123" />
          <div class="hint">Descripcion del param</div>
        </div>
      </div>
      <div>
        <div class="section-title">Query params</div>
        <div class="field">
          <label>param_opcional</label>
          <input id="e1_param" value="" placeholder="opcional" />
          <div class="hint">Descripcion del query param</div>
        </div>
      </div>
    </div>

    <hr>
    <button class="btn btn-run" onclick="callEndpoint('e1', buildUrl1)">Ejecutar</button>
    <button class="btn btn-curl" onclick="toggleCurl('curl1')">Ver curl</button>
    <div id="curl1" class="curl-box"></div>
    <div id="res_e1"></div>

  </div>
</div>

<!-- ENDPOINT 2: POST /ejemplo -->
<div class="endpoint" id="ep2">
  <div class="endpoint-header" onclick="toggle('ep2')">
    <span class="method method-POST">POST</span>
    <span class="path">/ejemplo</span>
    <span class="desc">&mdash; Descripcion breve del endpoint</span>
    <span class="chevron">&#9654;</span>
  </div>
  <div class="endpoint-body">

    <div class="section-title">Body (JSON)</div>
    <div class="field">
      <textarea id="e2_body" placeholder='{"campo": "valor"}'>{
  "campo": "valor"
}</textarea>
    </div>

    <hr>
    <button class="btn btn-run" onclick="callEndpoint('e2', buildUrl2, 'POST', 'e2_body')">Ejecutar</button>
    <button class="btn btn-curl" onclick="toggleCurl('curl2')">Ver curl</button>
    <div id="curl2" class="curl-box"></div>
    <div id="res_e2"></div>

  </div>
</div>

<!-- ============================================================ -->

<script>
// --- ENVIRONMENTS -------------------------------------------
const ENVS = {
  local:   { url: '{{BASE_URL_LOCAL}}',   project: '{{SERVICIO}} — Local' },
  qa:      { url: '{{BASE_URL_QA}}',      project: '{{SERVICIO}} — QA' },
  staging: { url: '{{BASE_URL_STAGING}}', project: '{{SERVICIO}} — Staging' },
  prod:    { url: '{{BASE_URL_PROD}}',    project: '{{SERVICIO}} — Produccion' },
};
let currentEnv = 'staging';

function setEnv(env) {
  currentEnv = env;
  document.querySelectorAll('.env-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.env-btn.' + env).classList.add('active');
  document.getElementById('envUrl').textContent     = ENVS[env].url;
  document.getElementById('envProject').textContent = ENVS[env].project;
}

function base()  { return ENVS[currentEnv].url; }
function token() { return document.getElementById('authToken').value.trim(); }

function headers(hasBody) {
  const h = {};
  if (hasBody) h['Content-Type'] = 'application/json';
  const t = token();
  if (t) h['Authorization'] = 'Bearer ' + t;
  return h;
}

// --- ACCORDION ----------------------------------------------
function toggle(id) { document.getElementById(id).classList.toggle('open'); }

// --- CURL ---------------------------------------------------
function toggleCurl(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function buildCurl(method, url, body) {
  const t = token();
  const auth = t ? ' \\\n  -H "Authorization: Bearer ' + t + '"' : '';
  const ct   = body ? ' \\\n  -H "Content-Type: application/json"' : '';
  const data = body ? " \\\n  -d '" + body + "'" : '';
  return 'curl -X ' + method + ' "' + url + '"' + auth + ct + data;
}

// --- JSON HIGHLIGHT -----------------------------------------
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function colorJson(obj) {
  return JSON.stringify(obj, null, 2).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],])/g,
    function(m) {
      if (/^"/.test(m)) return /:$/.test(m) ? '<span class="j-key">'  + esc(m) + '</span>'
                                             : '<span class="j-str">'  + esc(m) + '</span>';
      if (/true|false/.test(m)) return '<span class="j-bool">'  + m + '</span>';
      if (/null/.test(m))       return '<span class="j-null">'  + m + '</span>';
      if (/[{}\[\]]/.test(m))   return '<span class="j-brace">' + m + '</span>';
      return '<span class="j-num">' + m + '</span>';
    }
  );
}

// --- RESPONSE -----------------------------------------------
function showResponse(id, status, ms, data, isBlob) {
  const ok  = status >= 200 && status < 300;
  const cls = ok ? 'status-ok' : 'status-err';
  const raw = !isBlob ? JSON.stringify(data, null, 2) : '';
  const copyBtn = !isBlob
    ? '<button class="btn-copy" onclick="copyJson(\'' + id + '_raw\')">Copiar JSON</button>'
    : '';
  const toolbar = '<div class="response-toolbar">'
    + '<div class="response-meta"><span class="' + cls + '">' + status + '</span> &mdash; ' + ms + 'ms</div>'
    + copyBtn + '</div>';
  const body = isBlob
    ? '<pre style="color:#3fb950">Archivo descargado correctamente</pre>'
    : '<pre id="' + id + '_raw" style="display:none">' + esc(raw) + '</pre><pre>' + colorJson(data) + '</pre>';
  document.getElementById('res_' + id).innerHTML = toolbar + body;
}

function showError(id, err) {
  document.getElementById('res_' + id).innerHTML =
    '<div class="response-meta status-err" style="margin-top:14px;">Error de red</div><pre>' + err + '</pre>';
}

function copyJson(rawId) {
  navigator.clipboard.writeText(document.getElementById(rawId).textContent).then(() => {
    const btn = event.target;
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar JSON'; btn.classList.remove('copied'); }, 2000);
  });
}

// --- GENERIC CALLER -----------------------------------------
async function callEndpoint(id, urlBuilder, method, bodyInputId) {
  method = method || 'GET';
  let body = null;
  if (bodyInputId) {
    body = document.getElementById(bodyInputId).value.trim();
  }
  const url = urlBuilder();
  if (!url) return;
  const curlId = 'curl' + id.replace('e','');
  document.getElementById(curlId).textContent = buildCurl(method, url, body);
  const t0 = Date.now();
  try {
    const r = await fetch(url, { method, headers: headers(!!body), body: body || undefined });
    const ct = r.headers.get('content-type') || '';
    if (ct.includes('application/json')) {
      showResponse(id, r.status, Date.now() - t0, await r.json());
    } else if (ct.includes('spreadsheet') || ct.includes('octet-stream')) {
      const blob = await r.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'descarga_' + Date.now();
      a.click();
      showResponse(id, r.status, Date.now() - t0, null, true);
    } else {
      showResponse(id, r.status, Date.now() - t0, { raw: await r.text() });
    }
  } catch(e) { showError(id, e); }
}

// --- URL BUILDERS (uno por endpoint) ------------------------
function buildUrl1() {
  const id = document.getElementById('e1_id').value.trim();
  if (!id) { alert('id es requerido'); return null; }
  let url = base() + '/ejemplo/' + encodeURIComponent(id);
  const p = document.getElementById('e1_param').value.trim();
  if (p) url += '?param_opcional=' + encodeURIComponent(p);
  return url;
}

function buildUrl2() {
  return base() + '/ejemplo';
}
</script>
</body>
</html>
